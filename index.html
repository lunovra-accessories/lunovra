<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUXORA | Exclusive Boutique & Jewelry</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Cairo:wght@300;400;700&family=Playfair+Display:italic,wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* --- 1. المتغيرات والألوان الملكية --- */
        :root {
            --gold: #c5a059;
            --gold-light: #e2c285;
            --dark: #0a0a0a;
            --dark-soft: #1a1a1a;
            --cream: #fdfdfd;
            --white: #ffffff;
            --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- 2. تصفير الإعدادات والأساسيات --- */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
            scroll-behavior: smooth;
        }
        
        body { 
            background-color: var(--cream);
            color: var(--dark); 
            overflow-x: hidden; 
            line-height: 1.6;
        }

        /* --- 3. شاشة التحميل (Loader) --- */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 1s ease, visibility 1s;
        }
        .loader-logo {
            font-family: 'Cinzel', serif;
            font-size: 45px;
            color: var(--gold);
            letter-spacing: 12px;
            margin-bottom: 20px;
            animation: pulse-gold 2s infinite ease-in-out;
            text-shadow: 0 0 30px rgba(197, 160, 89, 0.5);
        }
        .loader-bar {
            width: 150px;
            height: 2px;
            background: rgba(197, 160, 89, 0.2);
            position: relative;
            overflow: hidden;
        }
        .loader-bar::after {
            content: '';
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--gold);
            animation: loading-slide 1.5s infinite;
        }
        @keyframes pulse-gold {
            0%, 100% { opacity: 0.4; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
        }
        @keyframes loading-slide {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        /* --- 4. شاشة اختيار القسم (Entry Screen) --- */
        #entry-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            z-index: 9000;
            background: var(--dark);
            transition: transform 1s cubic-bezier(0.85, 0, 0.15, 1);
        }
        .selection-half {
            flex: 1;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }
        .selection-half img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.45;
            transition: 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            filter: grayscale(60%) brightness(0.8);
        }
        .selection-half:hover img {
            transform: scale(1.15);
            opacity: 0.8;
            filter: grayscale(0%) brightness(1);
        }
        .selection-half .content-wrap {
            position: relative;
            z-index: 10;
            text-align: center;
        }
        .selection-half h2 {
            color: white;
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            letter-spacing: 10px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
            margin-bottom: 15px;
            transition: var(--transition);
        }
        .selection-half p {
            color: var(--gold);
            font-family: 'Cairo', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 4px;
            opacity: 0;
            transform: translateY(30px);
            transition: var(--transition);
        }
        .selection-half:hover h2 { transform: translateY(-10px); color: var(--gold); }
        .selection-half:hover p { opacity: 1; transform: translateY(0); }

        /* --- 5. الهيدر (Sticky Header) --- */
        header { 
            position: sticky;
            top: 0;
            z-index: 2000;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(15px);
            padding: 20px 8%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(197, 160, 89, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            height: 85px;
        }

        #back-btn-container {
            display: none;
            align-items: center;
            cursor: pointer;
            color: var(--gold);
            transition: var(--transition);
            opacity: 0;
            transform: translateX(20px);
        }
        #back-btn-container.visible {
            display: flex;
            opacity: 1;
            transform: translateX(0);
        }
        #back-btn-container:hover { color: var(--white); }
        
        .logo-text { 
            font-family: 'Cinzel', serif;
            font-size: 32px; 
            font-weight: 900; 
            color: var(--gold);
            letter-spacing: 8px;
            text-align: center;
            flex-grow: 1;
        }

        .cart-trigger {
            cursor: pointer;
            position: relative;
            padding: 5px;
        }
        .cart-icon-svg {
            width: 32px; height: 32px;
            fill: none; stroke: var(--gold); stroke-width: 1.2;
            transition: var(--transition);
        }
        .cart-trigger:hover .cart-icon-svg { stroke: var(--white); transform: scale(1.1); }

        #cart-count { 
            background: var(--gold);
            color: var(--dark);
            font-size: 12px;
            width: 24px; height: 24px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; 
            position: absolute; top: -8px; right: -10px;
            font-weight: 900;
            box-shadow: 0 5px 15px rgba(197, 160, 89, 0.4);
        }

        /* --- 6. شبكة عرض المنتجات --- */
        main { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 50px; 
            padding: 80px 5%; 
            max-width: 1400px;
            margin: 0 auto;
        }

        .product-card { 
            background: var(--white); 
            border: 1px solid #eeeeee;
            padding: 25px; 
            transition: var(--transition);
            cursor: pointer;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .product-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 0;
            background: var(--dark);
            z-index: 0;
            transition: var(--transition);
            opacity: 0.03;
        }
        .product-card:hover { 
            box-shadow: var(--shadow-lg);
            border-color: var(--gold);
            transform: translateY(-15px);
        }
        .product-card:hover::before { height: 100%; }
        
        .img-container {
            width: 100%;
            height: 380px;
            overflow: hidden;
            margin-bottom: 30px;
            position: relative;
            border-radius: 2px;
        }
        .product-card img { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: 1.2s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .product-card:hover img { transform: scale(1.1); }
        
        .product-card h3 { 
            font-size: 1.2rem; 
            color: var(--dark);
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            position: relative;
        }
        .product-card .price { 
            color: var(--gold); 
            font-weight: 900; 
            font-size: 1.6rem;
            font-family: 'Cinzel', serif;
            display: block;
        }

        /* --- 7. تفاصيل المنتج (Modal) - تحسين المربع والجوال --- */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 5000; justify-content: center; align-items: center; 
            backdrop-filter: blur(20px); 
            padding: 20px;
        }
        .modal-content { 
            background: var(--white); width: 100%; max-width: 1100px; 
            display: flex; position: relative; 
            overflow: hidden; border: 1px solid var(--gold);
            animation: modalSlideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            max-height: 90vh;
        }
        @keyframes modalSlideUp { 
            from { opacity: 0; transform: translateY(40px) scale(0.98); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }

        .close-modal {
            position: absolute; top: 20px; left: 20px; z-index: 100; 
            cursor: pointer; color: var(--gold); font-size: 20px; 
            background: var(--dark); width: 45px; height: 45px; 
            display: flex; align-items: center; justify-content: center; 
            border-radius: 50%; border: 1px solid var(--gold);
            transition: var(--transition);
        }
        .close-modal:hover { background: var(--gold); color: var(--dark); transform: rotate(90deg); }

        .modal-img { flex: 1.2; min-width: 450px; height: 700px; object-fit: cover; }
        .modal-info { 
            flex: 1; padding: 60px; min-width: 450px; background: var(--white); 
            display: flex; flex-direction: column; justify-content: center; 
        }
        
        .modal-info h2 { font-family: 'Cinzel', serif; font-size: 2.3rem; margin-bottom: 20px; color: var(--dark); border-bottom: 2px solid var(--gold); display: inline-block; padding-bottom: 10px; }
        .modal-info p { color: #444; font-size: 1.1rem; line-height: 1.8; margin-bottom: 30px; text-align: justify; }

        .qty-box { margin-bottom: 30px; }
        .qty-box label { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 2px; display: block; margin-bottom: 10px; }
        .qty-box input { width: 90px; padding: 12px; border: 1px solid #ccc; outline: none; font-weight: bold; text-align: center; }

        .add-btn { 
            background: var(--dark); color: var(--gold); border: 1px solid var(--gold); 
            padding: 22px; cursor: pointer; width: 100%; font-weight: 900; 
            text-transform: uppercase; letter-spacing: 4px; transition: var(--transition);
            font-size: 1rem;
        }
        .add-btn:hover { background: var(--gold); color: var(--dark); }

        /* --- 8. الحقيبة الجانبية (Sidebar) --- */
        .sidebar { 
            position: fixed; top: 0; left: -100%; width: 500px; height: 100vh; 
            background: var(--white); z-index: 6000; padding: 70px 50px; 
            transition: 0.8s cubic-bezier(0.9, 0, 0.1, 1); 
            box-shadow: 25px 0 70px rgba(0,0,0,0.4);
            border-right: 5px solid var(--gold);
        }
        .sidebar.active { left: 0; }

        .sidebar-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 60px; border-bottom: 1px solid #eee; padding-bottom: 25px;
        }
        .sidebar-header h3 { font-family: 'Cinzel'; font-size: 28px; color: var(--gold); letter-spacing: 5px; }

        .cart-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 30px 0; border-bottom: 1px solid #f2f2f2;
        }

        .cart-item-info strong { display: block; font-size: 17px; margin-bottom: 8px; color: var(--dark); }
        .cart-item-info span { color: var(--gold); font-family: 'Cinzel'; font-size: 16px; font-weight: 700; }
        .remove-item { cursor: pointer; color: #ccc; transition: 0.4s; padding: 12px; font-size: 18px; }
        .remove-item:hover { color: #e74c3c; transform: scale(1.3); }

        .whatsapp-btn { 
            background: var(--dark); color: var(--gold); border: 2px solid var(--gold); 
            padding: 25px; cursor: pointer; width: 100%; font-weight: 900; 
            margin-top: 60px; letter-spacing: 4px; text-transform: uppercase;
            transition: var(--transition); font-size: 1.1rem;
        }
        .whatsapp-btn:hover { background: #25D366; color: white; border-color: #25D366; }

        /* --- 9. التنبيهات (Toasts) --- */
        #toast { 
            position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%); 
            background: var(--dark); color: var(--gold); padding: 20px 60px; 
            font-weight: 900; opacity: 0; transition: 0.7s; z-index: 9999;
            border: 1px solid var(--gold); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            letter-spacing: 3px; pointer-events: none;
        }

        /* --- 10. ميديا كويري للجوال (التحسين المربع) --- */
        @media (max-width: 1024px) {
            main { grid-template-columns: repeat(2, 1fr); gap: 35px; }
            .modal-img { min-width: 100%; height: 500px; }
            .modal-info { min-width: 100%; padding: 40px; }
        }

        @media (max-width: 768px) {
            #entry-screen { flex-direction: column; }
            .selection-half h2 { font-size: 2.5rem; letter-spacing: 6px; }
            
            header { height: 80px; padding: 10px 5%; }
            .logo-text { font-size: 22px; letter-spacing: 4px; }
            
            main { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 20px 10px; }
            .product-card { padding: 12px; }
            .img-container { height: 200px; margin-bottom: 12px; }
            .product-card h3 { font-size: 0.9rem; }
            .product-card .price { font-size: 1.1rem; }

            /* المودال المربع للجوال */
            .modal-content { 
                flex-direction: column; 
                max-height: 85vh; 
                width: 95%;
                overflow-y: auto;
            }
            .modal-img { 
                min-width: 100%; 
                height: auto; 
                aspect-ratio: 1/1; /* شكل مربع تماماً في الجوال */
                border-bottom: 1px solid var(--gold);
            }
            .modal-info { 
                min-width: 100%; 
                padding: 30px 20px; 
                text-align: center;
                display: block; /* لضمان التمرير الطبيعي */
            }
            .modal-info h2 { font-size: 1.6rem; margin-top: 10px; }
            .modal-info p { text-align: center; font-size: 0.95rem; }
            
            .sidebar { width: 100%; padding: 40px 20px; }
        }
    </style>
</head>

            { 
                id: 10, type: 'men', name: "أزرار أكمام ألماسية", price: 1550, 
                description: "أزرار أكمام مصنوعة من البلاتين المرصع بحبيبات الألماس الدقيقة لتكتمل أناقتك الرسمية في الاجتماعات والمناسبات الخاصة.", 
                img: "https://images.unsplash.com/photo-1617113931036-70138927054a?w=800" 
            }
        ];

        let cart = JSON.parse(localStorage.getItem('luxora_full_storage')) || [];

        function enterStore(category) {
            const filtered = allProducts.filter(p => p.type === category);
            renderProducts(filtered);
            document.getElementById('entry-screen').style.transform = 'translateY(-100%)';
            document.getElementById('back-btn-container').classList.add('visible');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function goBackToHome() {
            document.getElementById('entry-screen').style.transform = 'translateY(0)';
            document.getElementById('back-btn-container').classList.remove('visible');
        }

        function renderProducts(products) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = products.map(p => `
                <div class="product-card" onclick="openProduct(${p.id})">
                    <div class="img-container">
                        <img src="${p.img}" alt="${p.name}" loading="lazy">
                    </div>
                    <h3>${p.name}</h3>
                    <span class="price">${p.price.toLocaleString()} درهم</span>
                </div>
            `).join('');
        }

        function openProduct(id) {
            const product = allProducts.find(p => p.id === id);
            if(!product) return;
            
            document.getElementById('modal-title').innerText = product.name;
            document.getElementById('modal-price').innerText = product.price.toLocaleString() + " درهم";
            document.getElementById('modal-description').innerText = product.description;
            document.getElementById('modal-image').src = product.img;
            document.getElementById('product-qty').value = 1;
            
            document.getElementById('modal-add-btn').onclick = function() {
                addToCart(product, parseInt(document.getElementById('product-qty').value));
            };
            
            document.getElementById('product-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('product-modal').style.display = 'none';
        }

        function addToCart(product, qty) {
            const newItem = { ...product, qty: qty, uniqueId: Date.now() };
            cart.push(newItem);
            saveCart();
            closeModal();
            showToast();
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2500);
        }

        function removeFromCart(uid) {
            cart = cart.filter(item => item.uniqueId !== uid);
            saveCart();
        }

        function saveCart() {
            localStorage.setItem('luxora_full_storage', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const container = document.getElementById('cart-items-container');
            let total = 0;
            
            container.innerHTML = cart.map(item => {
                total += (item.price * item.qty);
                return `
                    <div class="cart-item">
                        <div class="cart-item-info">
                            <strong>${item.name}</strong>
                            <span>${item.qty} × ${item.price.toLocaleString()} درهم</span>
                        </div>
                        <div class="remove-item" onclick="removeFromCart(${item.uniqueId})">✕</div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('final-price').innerText = total.toLocaleString() + " درهم";
        }

        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('active');
        }

        function checkout() {
            if (cart.length === 0) {
                alert("الحقيبة فارغة حالياً!");
                return;
            }
            const phone = "212621445495";
            let message = "*طلب ملكي جديد من LUXORA*\n";
            message += "--------------------------\n";
            cart.forEach((item, index) => {
                message += `${index + 1}. ${item.name} | الكمية: ${item.qty}\n`;
            });
            message += "--------------------------\n";
            message += `*الإجمالي:* ${document.getElementById('final-price').innerText}\n`;
            message += "يرجى التواصل لتأكيد التوصيل.";
            
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
        }

        window.onload = () => {
            updateCartUI();
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.visibility = 'hidden', 1000);
            }, 2000);
        };
    </script>
</body>
</html>
