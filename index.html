<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXora | متجر الإكسسوارات الفاخرة</title>
    <style>
        :root {
            --primary: #b8860b;
            --dark: #1a1a1a;
            --light: #fdfdfd;
            --glass: rgba(255, 255, 255, 0.9);
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            --whatsapp: #25D366;
            --danger: #e74c3c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', 'Segoe UI', sans-serif; }
        
        body { 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--dark);
            min-height: 100vh;
        }

        header { 
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 15px 8%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 2px 20px rgba(0,0,0,0.05); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }

        .logo { font-size: 30px; font-weight: 800; color: var(--primary); letter-spacing: 2px; text-transform: uppercase; }

        .cart-icon { cursor: pointer; position: relative; font-size: 26px; transition: transform 0.3s; }
        .cart-icon:hover { transform: scale(1.1); }

        #cart-count { 
            background: var(--dark); color: white; font-size: 11px; width: 20px; height: 20px;
            display: flex; align-items: center; justify-content: center; border-radius: 50%; 
            position: absolute; top: -5px; right: -10px; 
        }

        main { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; padding: 50px 8%; }

        .product-card { 
            background: white; padding: 15px; border-radius: 25px; text-align: center; border: none; 
            cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        .product-card:hover { transform: translateY(-15px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .product-card img { width: 100%; height: 300px; object-fit: cover; border-radius: 20px; margin-bottom: 15px; }

        .stock-tag { font-size: 0.85rem; color: var(--danger); font-weight: bold; margin-top: 5px; display: block; }
        .out-of-stock { color: #999; }

        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 2000; 
            justify-content: center; align-items: center; padding: 20px; 
        }

        .modal-content { 
            background: white; width: 100%; max-width: 900px; border-radius: 30px; 
            display: flex; flex-wrap: wrap; position: relative; overflow: hidden;
            box-shadow: var(--shadow); animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .modal-img { flex: 1; min-width: 350px; height: 500px; object-fit: cover; }
        .modal-info { flex: 1; padding: 40px; min-width: 350px; background: #fff; }

        .add-btn { 
            background: var(--dark); color: white; border: none; padding: 15px 30px; border-radius: 15px; 
            cursor: pointer; transition: 0.3s; width: 100%; font-weight: 600; font-size: 16px;
        }
        .add-btn:hover:not(:disabled) { background: var(--primary); transform: translateY(-2px); }
        .add-btn:disabled { background: #ccc; cursor: not-allowed; }

        .sidebar { 
            position: fixed; left: -400px; top: 0; width: 380px; height: 100%; 
            background: var(--glass); backdrop-filter: blur(15px);
            box-shadow: 10px 0 30px rgba(0,0,0,0.1); padding: 40px 30px; 
            transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1); z-index: 3000; 
        }
        .sidebar.active { left: 0; }

        .cart-item { 
            background: rgba(255,255,255,0.5); margin-bottom: 15px; padding: 15px;
            border-radius: 15px; display: flex; justify-content: space-between; align-items: center;
        }

        .whatsapp-btn {
            background-color: var(--whatsapp); color: white; border: none; padding: 15px 30px;
            border-radius: 15px; cursor: pointer; transition: 0.3s; width: 100%;
            font-weight: 800; font-size: 16px; margin-top: 25px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">hamza</div>
        <div class="cart-icon" onclick="toggleCart()">
            🛒 <span id="cart-count">0</span>
        </div>
    </header>

    <main id="products-container"></main>

    <div id="product-modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span onclick="closeModal()" style="position: absolute; top: 20px; left: 20px; cursor: pointer; font-size: 25px; background: white; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; z-index: 10;">&times;</span>
            <img id="modal-image" src="" class="modal-img">
            <div class="modal-info">
                <h2 id="modal-title"></h2>
                <p id="modal-price" style="color: var(--primary); font-weight: bold; font-size: 22px; margin: 10px 0;"></p>
                <p id="modal-stock" class="stock-tag"></p>
                <p id="modal-description" style="color: #777; margin-bottom: 20px;"></p>
                
                <div id="modal-action-area">
                    <div style="margin-bottom: 15px;">
                        <label>الكمية:</label>
                        <input type="number" id="product-qty" value="1" min="1" style="width: 60px; padding: 8px; border-radius: 8px; border: 1px solid #ddd;">
                    </div>
                    <button id="modal-add-btn" class="add-btn">إضافة إلى الحقيبة</button>
                </div>
            </div>
        </div>
    </div>

    <div id="cart-sidebar" class="sidebar">
        <h2 style="margin-bottom: 20px;">حقيبة التسوق</h2>
        <div id="cart-items"></div>
        <div id="cart-total" style="margin-top: 20px; font-weight: bold; font-size: 1.2rem; border-top: 1px solid #ddd; padding-top: 15px;"></div>
        <button class="whatsapp-btn" onclick="sendWhatsApp()">إرسال الطلب عبر واتساب</button>
        <button onclick="toggleCart()" style="width: 100%; margin-top: 10px; background: none; border: none; cursor: pointer; color: #888;">إغلاق</button>
    </div>

    <script>
        /**
         * 1. نظام تحديث النسخة
         * عند تعديل الـ stock يدوياً في قائمة المنتجات بالأسفل، 
         * قم بتغيير رقم النسخة هنا (مثلاً من v1.0 إلى v1.1) لكي يتحدث عند الجميع.
         **/
        const STORE_VERSION = "v1.0"; 

        // 2. قائمة المنتجات الأصلية (عدل الكميات هنا)
        const defaultProducts = [
            { id: 1, name: "عقد الزمرد الملكي", price: 3400, stock: 1, description: "عقد يدوي الصنع مرصع بأحجار الزمرد.", img: "https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=600" },
            { id: 2, name: "خاتم الألماس الهندسي", price: 1850, stock: 5, description: "تصميم عصري يجمع بين البساطة والفخامة.", img: "https://images.unsplash.com/photo-1605100804763-247f67b3557e?w=600" },
            { id: 3, name: "سوار الكريستال الناعم", price: 920, stock: 15, description: "سوار رقيق من الفضة الإسترلينية.", img: "https://images.unsplash.com/photo-1611591437281-460bfbe1220a?w=600" }
        ];

        // 3. التحقق من نسخة المتجر لتحديث بيانات الزبائن القدامى
        if (localStorage.getItem('luxe_version') !== STORE_VERSION) {
            localStorage.setItem('luxe_products', JSON.stringify(defaultProducts));
            localStorage.setItem('luxe_version', STORE_VERSION);
            // ملاحظة: لا نمسح السلة (luxe_cart) لكي لا نفقد طلبات الزبون الحالية
        }

        // 4. تحميل البيانات
        let products = JSON.parse(localStorage.getItem('luxe_products')) || defaultProducts;
        let cart = JSON.parse(localStorage.getItem('luxe_cart')) || [];

        function saveData() {
            localStorage.setItem('luxe_products', JSON.stringify(products));
            localStorage.setItem('luxe_cart', JSON.stringify(cart));
        }

        function displayProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = products.map(p => `
                <div class="product-card" onclick="openModal(${p.id})">
                    <img src="${p.img}">
                    <h3>${p.name}</h3>
                    <div style="color:var(--primary); font-weight:bold;">${p.price} درهم</div>
                    <span class="stock-tag ${p.stock <= 0 ? 'out-of-stock' : ''}">${p.stock > 0 ? `المتبقي: ${p.stock}` : 'نفدت الكمية'}</span>
                </div>
            `).join('');
        }

        function openModal(id) {
            const p = products.find(prod => prod.id === id);
            currentProductId = id;
            
            document.getElementById('modal-title').innerText = p.name;
            document.getElementById('modal-price').innerText = p.price + " درهم";
            document.getElementById('modal-description').innerText = p.description;
            document.getElementById('modal-image').src = p.img;
            
            const qtyInput = document.getElementById('product-qty');
            const addBtn = document.getElementById('modal-add-btn');
            const stockText = document.getElementById('modal-stock');

            qtyInput.value = 1;
            if(p.stock <= 0) {
                stockText.innerText = "هذا المنتج غير متوفر حالياً";
                addBtn.disabled = true;
                addBtn.innerText = "نفدت الكمية";
            } else {
                stockText.innerText = `الكمية المتوفرة: ${p.stock}`;
                addBtn.disabled = false;
                addBtn.innerText = "إضافة إلى الحقيبة";
                qtyInput.max = p.stock;
            }

            addBtn.onclick = () => addToCart(p, parseInt(qtyInput.value));
            document.getElementById('product-modal').style.display = 'flex';
        }

        function addToCart(product, qty) {
            if (qty > product.stock) {
                alert("الكمية المطلوبة أكبر من المتوفر!");
                return;
            }
            product.stock -= qty;
            const cartId = Date.now();
            cart.push({ ...product, qty, cartId, originalId: product.id });
            saveData();
            updateCartUI();
            displayProducts();
            closeModal();
            toggleCart();
        }

        function removeFromCart(cartId) {
            const itemIndex = cart.findIndex(i => i.cartId === cartId);
            if (itemIndex > -1) {
                const item = cart[itemIndex];
                const p = products.find(prod => prod.id === item.originalId);
                if (p) p.stock += item.qty;
                cart.splice(itemIndex, 1);
                saveData();
                updateCartUI();
                displayProducts();
            }
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const container = document.getElementById('cart-items');
            let total = 0;
            container.innerHTML = cart.map(item => {
                total += (item.price * item.qty);
                return `
                    <div class="cart-item">
                        <div>
                            <strong>${item.name}</strong><br>
                            <small>${item.qty} × ${item.price} درهم</small>
                        </div>
                        <button onclick="removeFromCart(${item.cartId})" style="border:none; color:red; background:none; cursor:pointer;">حذف</button>
                    </div>
                `;
            }).join('');
            document.getElementById('cart-total').innerText = "الإجمالي: " + total + " درهم";
        }

        function sendWhatsApp() {
            if (cart.length === 0) return;
            const phone = "212621445495";
            let msg = "طلب جديد من Luxora:\n";
            cart.forEach(i => msg += `- ${i.name} (عدد: ${i.qty})\n`);
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function closeModal() { document.getElementById('product-modal').style.display = 'none'; }
        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('active'); }

        window.onload = () => {
            displayProducts();
            updateCartUI();
        };
    </script>
</body>
</html>
