<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUXE | متجر الإكسسوارات الفاخرة</title>
    <style>
        :root {
            --primary: #b8860b;
            --dark: #1a1a1a;
            --light: #fdfdfd;
            --glass: rgba(255, 255, 255, 0.95);
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            --whatsapp: #25D366;
            --danger: #e74c3c;
        }

        /* تحسينات عامة للهاتف */
        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            background: #f8f9fa;
            color: var(--dark);
            overflow-x: hidden;
        }

        header { 
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 12px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: var(--shadow); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }

        .logo { font-size: 22px; font-weight: 800; color: var(--primary); letter-spacing: 1px; }

        .cart-icon { cursor: pointer; position: relative; font-size: 22px; }
        #cart-count { 
            background: var(--danger); color: white; font-size: 10px; width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center; border-radius: 50%; 
            position: absolute; top: -5px; right: -8px; font-weight: bold;
        }

        /* عرض منتجين في كل صف على الهاتف */
        main { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            padding: 15px; 
        }

        /* عرض 3 أو أكثر على الشاشات الكبيرة */
        @media (min-width: 768px) {
            main { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; padding: 40px 8%; }
        }

        .product-card { 
            background: white; padding: 10px; border-radius: 15px; text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04); transition: 0.3s;
            display: flex; flex-direction: column;
        }
        .product-card img { width: 100%; height: 160px; object-fit: cover; border-radius: 12px; margin-bottom: 8px; }
        
        @media (min-width: 768px) { .product-card img { height: 280px; } }

        .product-card h3 { font-size: 0.85rem; margin-bottom: 5px; height: 2.4em; overflow: hidden; }
        .product-card .price { color: var(--primary); font-weight: bold; font-size: 0.9rem; }

        .stock-tag { font-size: 0.7rem; color: var(--danger); font-weight: bold; margin-top: 4px; }

        /* نافذة المنتج المحسنة للهاتف */
        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); z-index: 2000; 
            justify-content: center; align-items: flex-end; 
        }

        .modal-content { 
            background: white; width: 100%; max-width: 500px; border-radius: 20px 20px 0 0; 
            position: relative; animation: slideUp 0.3s ease-out; max-height: 90vh; overflow-y: auto;
        }

        @media (min-width: 768px) {
            .modal { align-items: center; padding: 20px; }
            .modal-content { border-radius: 20px; }
        }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .modal-img { width: 100%; height: 250px; object-fit: cover; }
        .modal-info { padding: 20px; }

        .add-btn { 
            background: var(--dark); color: white; border: none; padding: 14px; border-radius: 12px; 
            cursor: pointer; width: 100%; font-weight: 600; font-size: 16px; margin-top: 15px;
        }

        /* سلة التسوق للهاتف */
        .sidebar { 
            position: fixed; left: -100%; top: 0; width: 100%; height: 100%; 
            background: white; padding: 20px; 
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 3000; 
        }
        .sidebar.active { left: 0; }

        .cart-item { 
            background: #f9f9f9; margin-bottom: 10px; padding: 12px;
            border-radius: 12px; display: flex; justify-content: space-between; align-items: center;
        }

        .whatsapp-btn {
            background-color: var(--whatsapp); color: white; border: none; padding: 16px;
            border-radius: 12px; cursor: pointer; width: 100%;
            font-weight: bold; font-size: 16px; margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Luxe</div>
        <div class="cart-icon" onclick="toggleCart()">
            🛒 <span id="cart-count">0</span>
        </div>
    </header>

    <main id="products-container"></main>

    <div id="product-modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div onclick="closeModal()" style="position: absolute; top: 10px; left: 10px; cursor: pointer; font-size: 18px; background: rgba(0,0,0,0.5); color: white; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%; z-index: 10;">✕</div>
            <img id="modal-image" src="" class="modal-img">
            <div class="modal-info">
                <h2 id="modal-title" style="font-size: 1.2rem;"></h2>
                <p id="modal-price" style="color: var(--primary); font-weight: bold; font-size: 1.1rem; margin: 5px 0;"></p>
                <p id="modal-description" style="color: #666; font-size: 0.9rem; margin-bottom: 15px;"></p>
                
                <div style="display: flex; align-items: center; gap: 10px;">
                    <label>الكمية:</label>
                    <input type="number" id="product-qty" value="1" min="1" style="flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #ddd; text-align: center;">
                </div>
                <button id="modal-add-btn" class="add-btn">إضافة للحقيبة</button>
            </div>
        </div>
    </div>

    <div id="cart-sidebar" class="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3>حقيبة التسوق</h3>
            <span onclick="toggleCart()" style="font-size: 24px; cursor: pointer;">✕</span>
        </div>
        <div id="cart-items" style="max-height: 60vh; overflow-y: auto;"></div>
        <div id="cart-total" style="margin-top: 15px; font-weight: bold; font-size: 1.1rem; border-top: 1px solid #eee; padding-top: 15px;"></div>
        <button class="whatsapp-btn" onclick="sendWhatsApp()">إرسال الطلب (واتساب)</button>
    </div>

    <script>
        const STORE_VERSION = "v1.5"; 

        const defaultProducts = [
            { id: 1, name: "عقد الزمرد الملكي", price: 3400, stock: 1, description: "عقد يدوي الصنع مرصع بأحجار الزمرد.", img: "https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=600" },
            { id: 2, name: "خاتم الألماس الهندسي", price: 1850, stock: 5, description: "تصميم عصري يجمع بين البساطة والفخامة.", img: "https://images.unsplash.com/photo-1605100804763-247f67b3557e?w=600" },
            { id: 3, name: "سوار الكريستال الناعم", price: 920, stock: 15, description: "سوار رقيق من الفضة الإسترلينية.", img: "https://images.unsplash.com/photo-1611591437281-460bfbe1220a?w=600" }
        ];

        if (localStorage.getItem('luxe_version') !== STORE_VERSION) {
            localStorage.setItem('luxe_products', JSON.stringify(defaultProducts));
            localStorage.setItem('luxe_version', STORE_VERSION);
        }

        let products = JSON.parse(localStorage.getItem('luxe_products')) || defaultProducts;
        let cart = JSON.parse(localStorage.getItem('luxe_cart')) || [];

        function displayProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = products.map(p => `
                <div class="product-card" onclick="openModal(${p.id})">
                    <img src="${p.img}">
                    <h3>${p.name}</h3>
                    <div class="price">${p.price} ر.س</div>
                    ${p.stock <= 0 ? '<span class="stock-tag">نفدت الكمية</span>' : ''}
                </div>
            `).join('');
        }

        function openModal(id) {
            const p = products.find(prod => prod.id === id);
            document.getElementById('modal-title').innerText = p.name;
            document.getElementById('modal-price').innerText = p.price + " ر.س";
            document.getElementById('modal-description').innerText = p.description;
            document.getElementById('modal-image').src = p.img;
            
            const qtyInput = document.getElementById('product-qty');
            const addBtn = document.getElementById('modal-add-btn');

            qtyInput.value = 1;
            if(p.stock <= 0) {
                addBtn.disabled = true;
                addBtn.innerText = "نفدت الكمية";
            } else {
                addBtn.disabled = false;
                addBtn.innerText = "إضافة للحقيبة";
            }

            addBtn.onclick = () => addToCart(p, parseInt(qtyInput.value));
            document.getElementById('product-modal').style.display = 'flex';
        }

        function addToCart(product, qty) {
            const cartId = Date.now();
            cart.push({ ...product, qty, cartId });
            localStorage.setItem('luxe_cart', JSON.stringify(cart));
            updateCartUI();
            closeModal();
            toggleCart();
        }

        function removeFromCart(cartId) {
            cart = cart.filter(item => item.cartId !== cartId);
            localStorage.setItem('luxe_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const container = document.getElementById('cart-items');
            let total = 0;
            container.innerHTML = cart.map(item => {
                total += (item.price * item.qty);
                return `
                    <div class="cart-item">
                        <div>
                            <strong style="font-size:0.85rem;">${item.name}</strong><br>
                            <small>${item.qty} × ${item.price} ر.س</small>
                        </div>
                        <button onclick="removeFromCart(${item.cartId})" style="border:none; color:red; background:none; cursor:pointer; font-size:0.8rem;">حذف</button>
                    </div>
                `;
            }).join('');
            document.getElementById('cart-total').innerText = "الإجمالي: " + total + " ر.س";
        }

        function sendWhatsApp() {
            if (cart.length === 0) return;
            const phone = "212621445495";
            let msg = "طلب جديد من Luxe:\n";
            cart.forEach(i => msg += `- ${i.name} (عدد: ${i.qty})\n`);
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        function closeModal() { document.getElementById('product-modal').style.display = 'none'; }
        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('active'); }

        window.onload = () => {
            displayProducts();
            updateCartUI();
        };
    </script>
</body>
</html>
