<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUXORA | Exclusive Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #c5a059;
            --dark: #0a0a0a;
            --cream: #fdfdfd;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.2);
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            background-color: var(--cream);
            color: var(--dark); 
            overflow-x: hidden; 
        }

        /* --- شاشة التحميل الفخمة --- */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--dark);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        .loader-logo {
            font-family: 'Cinzel', serif;
            font-size: 40px;
            color: var(--gold);
            letter-spacing: 10px;
            animation: pulse 2s infinite ease-in-out;
            text-shadow: 0 0 20px rgba(197, 160, 89, 0.4);
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1); }
        }
        /* ------------------------- */

        header { 
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(10px);
            padding: 10px 8%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--gold);
        }

        .logo { 
            font-family: 'Cinzel', serif;
            font-size: 26px; 
            font-weight: 900; 
            color: var(--gold);
            letter-spacing: 5px;
            text-shadow: 0 0 10px rgba(197, 160, 89, 0.3);
        }

        .cart-trigger {
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
        }

        .cart-icon-svg {
            width: 26px;
            height: 26px;
            fill: none;
            stroke: var(--gold);
            stroke-width: 3;
        }

        #cart-count { 
            background: var(--gold);
            color: var(--dark);
            font-size: 10px;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%; 
            position: absolute;
            top: -5px;
            right: -10px;
            font-weight: 800;
        }

        main { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; 
            padding: 40px 15px; 
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (min-width: 768px) {
            main { grid-template-columns: repeat(3, 1fr); gap: 40px; padding: 60px 8%; }
        }

        .product-card { 
            background: white; 
            border: 1px solid #f0f0f0;
            padding: 15px; 
            transition: 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            text-align: right;
        }
        .product-card:hover { 
            box-shadow: var(--shadow);
            border-color: var(--gold);
            transform: translateY(-5px);
        }
        
        .product-card img { 
            width: 100%; height: 200px; object-fit: cover; 
            margin-bottom: 15px;
            filter: grayscale(10%) contrast(110%);
        }
        
        .product-card h3 { 
            font-size: 0.85rem; 
            color: #444;
            margin-bottom: 8px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }
        .product-card .price { 
            color: var(--gold); 
            font-weight: 700; 
            font-size: 1.1rem;
            font-family: 'Cinzel', serif;
        }

        .modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; 
            backdrop-filter: blur(10px); 
        }
        .modal-content { 
            background: white; width: 90%; max-width: 850px; 
            display: flex; flex-wrap: wrap; position: relative; overflow-y: auto; max-height: 90vh;
            border: 1px solid var(--gold);
        }
        .modal-img { flex: 1; min-width: 300px; height: 450px; object-fit: cover; }
        .modal-info { flex: 1; padding: 40px; min-width: 300px; background: white; }
        
        @media (max-width: 600px) {
            .modal-img { height: 250px; min-width: 100%; }
            .modal-info { padding: 20px; min-width: 100%; }
        }

        .modal-info h2 { font-family: 'Cinzel', serif; font-size: 1.5rem; margin-bottom: 15px; letter-spacing: 1px; }
        .modal-info p { color: #666; font-size: 0.9rem; line-height: 1.8; margin-bottom: 25px; }

        .add-btn { 
            background: var(--dark); color: var(--gold); border: 1px solid var(--gold); 
            padding: 15px; cursor: pointer; width: 100%; font-weight: 700; 
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }
        .add-btn:hover { background: var(--gold); color: var(--dark); }

        .sidebar { 
            position: fixed; top: 0; left: -100%; width: 350px; height: 100vh; 
            background: white; z-index: 3000; padding: 40px 25px; 
            transition: 0.5s; box-shadow: 10px 0 50px rgba(0,0,0,0.1);
            border-right: 2px solid var(--gold);
        }
        .sidebar.active { left: 0; }
        @media (max-width: 767px) { .sidebar { width: 100%; left: -100%; } .sidebar.active { left: 0; } }

        .whatsapp-btn { 
            background: var(--dark); color: var(--gold); border: 1px solid var(--gold); 
            padding: 18px; cursor: pointer; width: 100%; font-weight: bold; 
            margin-top: 30px; letter-spacing: 1px;
        }

        #toast { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            background: var(--gold); color: var(--dark); padding: 12px 35px; 
            font-weight: bold; opacity: 0; transition: 0.5s; z-index: 4000;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-logo">LUXORA</div>
    </div>

    <header>
        <div class="logo">LUXORA</div>
        <div class="cart-trigger" onclick="toggleCart()">
            <svg class="cart-icon-svg" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"></path>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <path d="M16 10a4 4 0 0 1-8 0"></path>
            </svg>
            <span id="cart-count">0</span>
        </div>
    </header>

    <main id="products-container"></main>

    <div id="toast">أُضيف إلى مجموعتك المختارة</div>

    <div id="product-modal" class="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div onclick="closeModal()" style="position: absolute; top: 15px; left: 15px; z-index: 10; cursor: pointer; color: var(--gold); font-size: 20px; background: rgba(255,255,255,0.8); width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 50%;">✕</div>
            <img id="modal-image" src="" class="modal-img">
            <div class="modal-info">
                <h2 id="modal-title"></h2>
                <p id="modal-price" style="color: var(--gold); font-weight: bold; font-size: 1.4rem; font-family: 'Cinzel';"></p>
                <p id="modal-description"></p>
                <div style="margin-bottom: 20px;">
                    <label style="font-size: 11px; color: #999; text-transform: uppercase;">الكمية المطلوبة</label>
                    <input type="number" id="product-qty" value="1" min="1" style="width: 100%; padding: 10px; border: 1px solid #eee; margin-top: 8px;">
                </div>
                <button id="modal-add-btn" class="add-btn">أضف للحقيبة</button>
            </div>
        </div>
    </div>

    <div id="cart-sidebar" class="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
            <h3 style="font-family: 'Cinzel'; color: var(--gold); letter-spacing: 2px;">الحقيبة</h3>
            <span style="cursor: pointer; font-size: 24px;" onclick="toggleCart()">✕</span>
        </div>
        <div id="cart-items" style="max-height: 65vh; overflow-y: auto;"></div>
        <div id="cart-total" style="margin-top: 25px; font-weight: bold; border-top: 1px solid #eee; padding-top: 20px; text-align: center; font-family: 'Cinzel'; font-size: 1.2rem;"></div>
        <button class="whatsapp-btn" onclick="sendWhatsApp()">إتمام الطلب الملكي</button>
    </div>

    <script>
        const defaultProducts = [
            { id: 1, name: "عقد الزمرد الملكي", price: 3400, description: "قطعة فنية مرصعة بالزمرد الكولومبي الأصيل مع تفاصيل ذهبية يدوية.", img: "https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=600" },
            { id: 2, name: "خاتم الألماس الهندسي", price: 1850, description: "خاتم فريد يجمع بين نقاء الألماس والتصميم الهندسي المعاصر.", img: "https://images.unsplash.com/photo-1605100804763-247f67b3557e?w=600" },
            { id: 3, name: "سوار الكريستال الناعم", price: 920, description: "سوار رقيق وبسيط مرصع بالكريستال اللامع لجمال يومي خالد.", img: "https://images.unsplash.com/photo-1611591437281-460bfbe1220a?w=600" },
            { id: 4, name: "ساعة ليمتد إيديشين", price: 5200, description: "ساعة كلاسيكية بطلاء ذهبي ثقيل وتصميم داخلي صدفي.", img: "https://images.unsplash.com/photo-1772949400376-5965cc2256ea?q=80&w=870&auto=format&fit=crop" },
            { id: 5, name: "خاتم الياقوت القرمزي", price: 2100, description: "خاتم ملكي مرصع بحجر ياقوت أحمر جذاب محاط بالألماس.", img: "https://media.istockphoto.com/id/2077222877/fr/photo/bague-bijoux-pierres-pr%C3%A9cieuses.webp?a=1&b=1&s=612x612&w=0&k=20&c=OUIgGMG3OGlm4MnWHh3HnHY7NNypX-WglWqKZcDc5CY=" },
            { id: 6, name: "خاتم فضة 925 نقي", price: 7000, description: "خاتم رجالي ثقيل من الفضة الإسترلينية بتصميم نيو-كلاسيك.", img: "https://fathyibrahim.com/cdn/shop/files/MR00-3S-8-1_1000x.jpg?v=1742217351" },
        ];

        let cart = JSON.parse(localStorage.getItem('luxora_cart')) || [];

        function displayProducts() {
            const container = document.getElementById('products-container');
            container.innerHTML = defaultProducts.map(p => `
                <div class="product-card" onclick="openModal(${p.id})">
                    <img src="${p.img}">
                    <h3>${p.name}</h3>
                    <div class="price">${p.price.toLocaleString()} درهم</div>
                </div>
            `).join('');
        }

        function openModal(id) {
            const p = defaultProducts.find(prod => prod.id === id);
            document.getElementById('modal-title').innerText = p.name;
            document.getElementById('modal-price').innerText = p.price.toLocaleString() + " درهم";
            document.getElementById('modal-description').innerText = p.description;
            document.getElementById('modal-image').src = p.img;
            document.getElementById('product-qty').value = 1;
            document.getElementById('modal-add-btn').onclick = () => addToCart(p, parseInt(document.getElementById('product-qty').value));
            document.getElementById('product-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('product-modal').style.display = 'none'; }

        function addToCart(product, qty) {
            cart.push({ ...product, qty, cartId: Date.now() });
            localStorage.setItem('luxora_cart', JSON.stringify(cart));
            updateCartUI();
            closeModal();
            const toast = document.getElementById('toast');
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2500);
        }

        function updateCartUI() {
            document.getElementById('cart-count').innerText = cart.length;
            const container = document.getElementById('cart-items');
            let total = 0;
            container.innerHTML = cart.map(item => {
                total += (item.price * item.qty);
                return `<div style="margin-bottom: 15px; padding: 12px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center;">
                    <div><strong style="font-size: 13px;">${item.name}</strong><br><small style="color:var(--gold)">${item.qty} × ${item.price.toLocaleString()} درهم</small></div>
                    <button onclick="removeFromCart(${item.cartId})" style="border:none; color:#ccc; background:none; cursor:pointer;">✕</button>
                </div>`;
            }).join('');
            document.getElementById('cart-total').innerText = "الإجمالي: " + total.toLocaleString() + " درهم";
        }

        function removeFromCart(cartId) {
            cart = cart.filter(item => item.cartId !== cartId);
            localStorage.setItem('luxora_cart', JSON.stringify(cart));
            updateCartUI();
        }

        function toggleCart() { document.getElementById('cart-sidebar').classList.toggle('active'); }

        function sendWhatsApp() {
            if (cart.length === 0) return;
            const phone = "212621445495";
            let msg = "طلب جديد من LUXORA Boutique:\n\n" + cart.map(i => `- ${i.name} (الكمية: ${i.qty})`).join('\n');
            msg += `\n\nالقيمة الإجمالية: ${document.getElementById('cart-total').innerText}`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
        }

        // إخفاء شاشة التحميل عند اكتمال تحميل الصفحة
        window.onload = () => { 
            displayProducts(); 
            updateCartUI();
            
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
            }, 1500); // تظهر لمدة ثانية ونصف لتعطي فخامة
        };
    </script>
</body>
</html>
